<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Bulunamadı - Anatolia Lojistik</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f3460;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .box { padding: 40px; }
        h1 { font-size: 6rem; color: #e94560; font-weight: 900; }
        h2 { font-size: 1.8rem; margin: 20px 0; }
        p { font-size: 1.1rem; margin-bottom: 30px; color: #ccc; }
        a {
            display: inline-block;
            padding: 14px 40px;
            background: #e94560;
            color: #fff;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
        }
        a:hover { background: #c73650; transform: scale(1.05); }
        .truck { font-size: 4rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="truck">🚛</div>
        <h1>404</h1>
        <h2>Sayfa Bulunamadı</h2>
        <p>Üzgünüz, aradığınız sayfaya ulaşılamıyor.<br>Ana sayfaya dönerek hizmetlerimize göz atabilirsiniz.</p>
        <a href="/nakliye-demo/">← Ana Sayfaya Dön</a>
    </div>
</body>
</html>
